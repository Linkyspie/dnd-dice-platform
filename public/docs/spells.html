<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Spell Compendium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --damage: #e74c3c;
            --status: #f39c12;
            --buff: #2ecc71;
            --blood: #8e44ad;
            --qol: #1abc9c;
            --grav: #34495e;
        }

        body {
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.7);
            background: linear-gradient(to right, #3498db, #2ecc71, #e74c3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--secondary);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
        }

        .spells-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .spell-card {
            background: rgba(30, 40, 50, 0.8);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .spell-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(52, 152, 219, 0.5);
        }

        .card-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .spell-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .spell-type {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .damage {
            background: var(--damage);
        }

        .status {
            background: var(--status);
        }

        .buff {
            background: var(--buff);
        }

        .blood {
            background: var(--blood);
        }

        .qol {
            background: var(--qol);
        }

        .grav {
            background: var(--grav);
        }

        .spell-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-item {
            display: flex;
            gap: 10px;
        }

        .detail-label {
            font-weight: 600;
            min-width: 120px;
            color: #3498db;
        }

        .detail-value {
            flex: 1;
        }

        .effect {
            line-height: 1.6;
        }

        .check-effect {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .critical-effect {
            color: #f1c40f;
            font-style: italic;
            margin-top: 10px;
            padding: 10px;
            border-left: 3px solid #f1c40f;
        }

        .failure-effect {
            color: #e74c3c;
            font-style: italic;
            margin-top: 10px;
            padding: 10px;
            border-left: 3px solid #e74c3c;
        }

        .blood-cost,
        .penalty {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            margin-left: 5px;
        }

        .blood-cost {
            background: rgba(142, 68, 173, 0.3);
            color: #8e44ad;
        }

        .penalty {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: #bbb;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 30px;
            color: #bbb;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .spells-container {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }

            h1 {
                font-size: 2.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .search-box {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-book-spells"></i> Spell Compendium</h1>
        </header>

        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск заклинаний...">
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-globe"></i> Все</button>
                <button class="filter-btn" data-filter="damage"><i class="fas fa-fire"></i> Урон</button>
                <button class="filter-btn" data-filter="status"><i class="fas fa-skull"></i> Состояния</button>
                <button class="filter-btn" data-filter="buff"><i class="fas fa-shield-alt"></i> Бафы</button>
                <button class="filter-btn" data-filter="blood"><i class="fas fa-tint"></i> Кровь</button>
                <button class="filter-btn" data-filter="qol"><i class="fas fa-campground"></i> QoL</button>
                <button class="filter-btn" data-filter="grav"><i class="fas fa-weight-hanging"></i> Гравитация</button>
            </div>
        </div>

        <div class="spells-container" id="spellsContainer">
            <!-- Spells will be dynamically inserted here -->
        </div>

        <footer>
            <p>Нахуй ты это читаешь?</p>
        </footer>
    </div>

    <script>
        // Augment spell data with additional properties
        function augmentSpellData(spells) {
            return spells.map(spell => {
                // Determine spell category based on ID prefix
                let category = 'other';
                if (spell.id.startsWith('damage')) category = 'damage';
                else if (spell.id.startsWith('status')) category = 'status';
                else if (spell.id.startsWith('buff')) category = 'buff';
                else if (spell.id.startsWith('blood')) category = 'blood';
                else if (spell.id.startsWith('QOL')) category = 'qol';
                else if (spell.id.startsWith('GRAV')) category = 'grav';

                // Add category property
                spell.category = category;

                // Add localized category names
                const categoryNames = {
                    'damage': 'Урон',
                    'status': 'Состояния',
                    'buff': 'Бафы',
                    'blood': 'Кровь',
                    'qol': 'QoL',
                    'grav': 'Гравитация',
                    'other': 'Другое'
                };
                spell.categoryName = categoryNames[category];

                // Add CSS class for styling
                spell.typeClass = category;

                // Format cost for display
                spell.costDisplay = spell.cost.includes('слот') ? spell.cost : `${spell.cost} слот${getSlotEnding(spell.cost)}`;

                // Add blood cost indicator
                spell.hasBloodCost = spell.blood_cost && spell.blood_cost !== '0' && spell.blood_cost !== '';

                // Add penalty indicator
                spell.hasPenalty = spell.penalty && spell.penalty !== '0' && spell.penalty !== '' && spell.penalty !== 'Нет';

                return spell;
            });
        }

        // Helper function to get Russian slot ending
        function getSlotEnding(count) {
            const num = parseInt(count);
            if (isNaN(num)) return '';

            const lastDigit = num % 10;
            const lastTwoDigits = num % 100;

            if (lastTwoDigits >= 11 && lastTwoDigits <= 19) {
                return 'ов';
            } else if (lastDigit === 1) {
                return '';
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                return 'а';
            } else {
                return 'ов';
            }
        }

        // Render spells to the page
        function renderSpells(spells) {
            const container = document.getElementById('spellsContainer');
            container.innerHTML = '';

            if (spells.length === 0) {
                container.innerHTML = '<div class="no-results">Ничего не найдено. Попробуйте другой запрос.</div>';
                return;
            }

            spells.forEach(spell => {
                const card = document.createElement('div');
                card.className = 'spell-card';
                card.dataset.category = spell.category;

                card.innerHTML = `
            <div class="card-header">
                <div class="spell-name">
                    ${spell.name}
                    <span class="spell-type ${spell.typeClass}">${spell.categoryName}</span>
                </div>
            </div>
            <div class="spell-details">
                <div class="detail-item">
                    <span class="detail-label">Стоимость:</span>
                    <span class="detail-value">${spell.costDisplay}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Время:</span>
                    <span class="detail-value">${spell.casting_time}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Длительность:</span>
                    <span class="detail-value">${spell.duration}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Эффект:</span>
                    <span class="detail-value effect">${spell.effect}</span>
                </div>
                
                ${spell.check_type && spell.check_type !== 'Нет' ? `
                <div class="detail-item">
                    <span class="detail-label">Проверка:</span>
                    <span class="detail-value">${spell.check_type}</span>
                </div>
                ` : ''}
                
                ${spell.check_effect && spell.check_effect !== 'Нет' && spell.check_effect !== 'Не требует проверки' ? `
                <div class="check-effect">${spell.check_effect}</div>
                ` : ''}
                
                ${spell.critical_effect && spell.critical_effect !== 'Нет' ? `
                <div class="critical-effect">
                    <strong>Критический эффект:</strong> ${spell.critical_effect}
                </div>
                ` : ''}
                
                ${spell.failure_effect && spell.failure_effect !== 'Нет' ? `
                <div class="failure-effect">
                    <strong>Провал:</strong> ${spell.failure_effect}
                </div>
                ` : ''}
                
                ${spell.hasBloodCost ? `
                <div class="detail-item">
                    <span class="detail-label">Цена крови:</span>
                    <span class="detail-value"><span class="blood-cost">${spell.blood_cost} HP</span></span>
                </div>
                ` : ''}
                
                ${spell.hasPenalty ? `
                <div class="detail-item">
                    <span class="detail-label">Штраф:</span>
                    <span class="detail-value"><span class="penalty">${spell.penalty}</span></span>
                </div>
                ` : ''}
            </div>
        `;

                container.appendChild(card);
            });
        }

        // Filter spells based on search and category
        function filterSpells(spells, searchTerm, categoryFilter) {
            return spells.filter(spell => {
                // Category filter
                if (categoryFilter !== 'all' && spell.category !== categoryFilter) {
                    return false;
                }

                // Search term filter
                if (searchTerm) {
                    const lowerSearch = searchTerm.toLowerCase();
                    return (
                        spell.name.toLowerCase().includes(lowerSearch) ||
                        spell.effect.toLowerCase().includes(lowerSearch) ||
                        spell.check_type.toLowerCase().includes(lowerSearch) ||
                        spell.check_effect.toLowerCase().includes(lowerSearch) ||
                        spell.critical_effect.toLowerCase().includes(lowerSearch) ||
                        spell.failure_effect.toLowerCase().includes(lowerSearch)
                    );
                }

                return true;
            });
        }

        // Set up event listeners
        function setupEventListeners(spells) {
            const searchInput = document.getElementById('searchInput');
            const filterButtons = document.querySelectorAll('.filter-btn');

            // Search input handler
            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.trim();
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                const filteredSpells = filterSpells(spells, searchTerm, activeFilter);
                renderSpells(filteredSpells);
            });

            // Filter button handlers
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update active button
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    // Filter spells
                    const categoryFilter = button.dataset.filter;
                    const searchTerm = searchInput.value.trim();
                    const filteredSpells = filterSpells(spells, searchTerm, categoryFilter);
                    renderSpells(filteredSpells);
                });
            });
        }
